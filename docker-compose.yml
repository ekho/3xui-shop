# Бот слушает plain HTTP на BOT_PORT (по умолчанию 8080) и публикует этот порт на хост.
# Если используете вебхук-режим (BOT_USE_WEBHOOK=True), поставьте перед ботом свой
# reverse-proxy с TLS (Traefik/Nginx/Caddy и т.п.) — пример для Traefik см. в DEPLOYMENT.md.
# Для long-polling (BOT_USE_WEBHOOK=False) публичный домен/TLS не нужны вовсе.
# Секреты — через docker compose secrets (G10), читаются из /run/secrets/* по конвенции *_FILE.
services:
  redis:
    image: redis:7.4-alpine            # M1: пин версии вместо :latest (детерминированная сборка)
    container_name: 3xui-shop-redis
    restart: always
    networks: [default]
    volumes:
      - redis_data:/data               # FSM + дедуп-ключи напоминаний переживают рестарт
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build: .
    container_name: 3xui-shop-bot
    ports:
      - "${BOT_PORT:-8080}:${BOT_PORT:-8080}"
    volumes:
      - ./app/data:/app/data            # B8: bot_database.sqlite3 (юзеры/транзакции/серверы) — персистентно
      - ./plans.json:/app/data/plans.json
      - ./app/locales:/app/locales
      - ./app/logs:/app/logs
    env_file:
      - .env                            # только НЕсекретные значения
    environment:                        # G10: секреты — из файлов /run/secrets/* по конвенции *_FILE
      BOT_TOKEN_FILE: /run/secrets/bot_token
      XUI_PASSWORD_FILE: /run/secrets/xui_password
      WEBHOOK_SECRET_FILE: /run/secrets/webhook_secret   # B7
      # SUPPORT_BOT_TOKEN_FILE: /run/secrets/support_bot_token       # прокси-поддержка (+ SUPPORT_GROUP_ID в .env)
      # CRYPTOMUS_API_KEY_FILE: /run/secrets/cryptomus_api_key       # раскомментировать при Cryptomus
      # CRYPTOMUS_MERCHANT_ID_FILE: /run/secrets/cryptomus_merchant_id
      # MANUAL_CARD_DETAILS_FILE: /run/secrets/manual_card_details   # Этап 4
    secrets:
      - bot_token
      - xui_password
      - webhook_secret
      # - support_bot_token
      # - cryptomus_api_key
      # - cryptomus_merchant_id
      # - manual_card_details
    stop_signal: SIGINT
    restart: unless-stopped
    # локали + миграции + запуск выполняет ENTRYPOINT образа (docker-entrypoint.sh)
    depends_on:
      redis:
        condition: service_healthy      # M1: bot не стартует раньше готового redis
    labels:
      # gobackup: SQLite-БД бота как database-модель (обнаружение по gobackup.* меткам, аналогично archive).
      # Путь указан внутри контейнера gobackup — он должен монтировать data-том бота (см. ниже).
      - "gobackup.databases.shop.type=sqlite"
      - "gobackup.databases.shop.path=/app/data/bot_database.sqlite3"

networks:
  default:

volumes:
  redis_data:

secrets:
  bot_token:
    file: ./secrets/bot_token.txt
  xui_password:
    file: ./secrets/xui_password.txt
  webhook_secret:
    file: ./secrets/webhook_secret.txt
  # support_bot_token:
  #   file: ./secrets/support_bot_token.txt
  # cryptomus_api_key:
  #   file: ./secrets/cryptomus_api_key.txt
  # cryptomus_merchant_id:
  #   file: ./secrets/cryptomus_merchant_id.txt
  # manual_card_details:
  #   file: ./secrets/manual_card_details.txt
